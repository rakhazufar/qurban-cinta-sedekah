<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terima Kasih - Konfirmasi Pembayaran</title>
    <!-- Bootstrap CSS for layout consistency -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #3D9140;
            --primary-gradient: linear-gradient(135deg, #3D9140 0%, #2e6d30 100%);
        }
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .thankyou-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .status-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .status-success { color: #28a745; }
        .status-pending { color: #ffc107; }
        .status-failed { color: #dc3545; }
        
        .order-details {
            background: #f1f3f5;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 1px solid #dee2e6;
            padding-bottom: 5px;
        }
        .detail-row:last-child {
            border-bottom: none;
        }
        .btn-home {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s;
        }
        .btn-home:hover {
            color: white;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="thankyou-card">
    <div id="status-icon-container" class="status-icon">
        <!-- Icon will be inserted by JS -->
    </div>
    <h2 id="status-title">Memproses...</h2>
    <p id="status-message">Mohon tunggu sebentar, kami sedang mengambil data transaksi Anda.</p>

    <div class="order-details">
        <div class="detail-row">
            <span>Order ID:</span>
            <strong id="display-order-id">-</strong>
        </div>
        <div class="detail-row">
            <span>Status:</span>
            <strong id="display-status">-</strong>
        </div>
        <div class="detail-row">
            <span>Jumlah:</span>
            <strong id="display-amount">-</strong>
        </div>
        <div class="detail-row">
            <span>Metode:</span>
            <strong id="display-payment-type">-</strong>
        </div>
    </div>

    <a href="index.html" class="btn-home">
        <i class="fas fa-home me-2"></i> Kembali ke Beranda
    </a>
</div>

<script>
    // Function to get URL parameters
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    // Format currency to IDR
    function formatIDR(amount) {
        if (!amount) return "-";
        return new Intl.NumberFormat('id-ID', {
            style: 'currency',
            currency: 'IDR',
            minimumFractionDigits: 0
        }).format(amount);
    }

    // Get values from URL
    const orderId = getQueryParam('order_id');
    const status = getQueryParam('status');
    const amount = getQueryParam('amount');
    const paymentType = getQueryParam('payment_type') || 'Midtrans';

    // Update UI based on status
    const iconContainer = document.getElementById('status-icon-container');
    const title = document.getElementById('status-title');
    const message = document.getElementById('status-message');

    document.getElementById('display-order-id').textContent = orderId || '-';
    document.getElementById('display-amount').textContent = formatIDR(amount);
    document.getElementById('display-payment-type').textContent = paymentType;

    if (status === 'success') {
        iconContainer.innerHTML = '<i class="fas fa-check-circle status-success"></i>';
        title.textContent = 'Terima Kasih!';
        message.textContent = 'Pembayaran Anda telah berhasil kami terima. Jazakumullahu Khayran.';
        document.getElementById('display-status').textContent = 'Sukses';
        document.getElementById('display-status').className = 'text-success';
    } else if (status === 'pending') {
        iconContainer.innerHTML = '<i class="fas fa-clock status-pending"></i>';
        title.textContent = 'Menunggu Pembayaran';
        message.textContent = 'Pesanan Anda telah dicatat. Silakan selesaikan pembayaran sesuai instruksi.';
        document.getElementById('display-status').textContent = 'Pending';
        document.getElementById('display-status').className = 'text-warning';
    } else {
        iconContainer.innerHTML = '<i class="fas fa-times-circle status-failed"></i>';
        title.textContent = 'Pembayaran Gagal';
        message.textContent = 'Mohon maaf, terjadi kendala pada transaksi Anda. Silakan coba lagi.';
        document.getElementById('display-status').textContent = 'Gagal / Batal';
        document.getElementById('display-status').className = 'text-danger';
    }
</script>

</body>
</html>
